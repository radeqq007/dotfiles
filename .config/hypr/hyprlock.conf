$wallpaper = ~/.config/pictures/wallpaper.png
$profile_picture = ~/.config/pictures/pfp.jpg

# BACKGROUND
background {
    monitor =
    path = $wallpaper
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 260, 50
    outline_thickness = 1
    dots_size = 0.2 
    dots_spacing = 0.35
    dots_center = true
    dots_color = rgb(255, 255, 255)
    outer_color = rgb(255, 255, 255)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 20 
    check_color = rgb(204, 136, 34)
    placeholder_text = <i><span foreground="##cdd6f4">Input Password...</span></i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 22
  font_family = JetBrains Mono
  position = 0, 300
  halign = center
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 200
  halign = center
  valign = center
}

image {
   monitor =
   path = $profile_picture
   size = 140
   border_size = 2
   border_color = $foreground
   position = 0, -80
   halign = center
   valign = center
}
